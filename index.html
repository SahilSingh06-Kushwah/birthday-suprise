<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#ffd6e0,#d6f0ff);
}

.page{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}
.active{display:flex;}

h1{
    font-family:'Playfair Display';
    font-size:3rem;
}

/* glow */
.glow{
    background:linear-gradient(90deg,#ff4d88,#6ec6ff,#ff4d88);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* card */
.card{
    width:90%;
    max-width:500px;
    padding:40px;
    border-radius:20px;
    background:white;
}

/* input */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

/* button */
button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#ff4d88,#6ec6ff);
    color:white;
    cursor:pointer;
    margin-top:10px;
}

/* text */
#typing{
    max-width:800px;
    font-size:20px;
    white-space:pre-line;
}

/* gallery */
#gallery{
    display:none;
    height:100vh;
    overflow:auto;
}
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    padding:20px;
}
.grid img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:10px;
}

/* viewer */
#viewer{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
}
#viewer img{
    max-width:90%;
    max-height:90%;
}

#closeBtn{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:25px;
    cursor:pointer;
}

/* fireworks */
.fire{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    animation:boom 1s forwards;
}
@keyframes boom{
    to{
        transform:translate(var(--x),var(--y));
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- INPUT -->
<div id="inputPage" class="page active">
<div class="card">
<h1>Enter Details 🎂</h1>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">

<button onclick="generateLink()">Generate Share Link 🔗</button>
<p id="linkBox"></p>

<button onclick="start()">Start 💖</button>
</div>
</div>

<!-- HERO -->
<div id="hero" class="page">
<h1 id="title"></h1>
<button onclick="celebrate()">Celebrate 🎉</button>
</div>

<!-- FINAL -->
<div id="final" class="page">
<div id="typing"></div>
</div>

<audio id="song" src="song2.mp3" loop></audio>

<script>

let currentName="";
let currentAge="";

/* START */
function start(){
    let name=document.getElementById("name").value;
    let age=document.getElementById("age").value;

    if(!name || !age){
        alert("Fill details");
        return;
    }

    currentName=name;
    currentAge=age;

    show("hero");

    document.getElementById("title").innerHTML=
    `Happy ${age} Birthday <span class="glow">${name}</span>`;
}

/* SWITCH */
function show(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* CELEBRATE */
function celebrate(){
    let audio=document.getElementById("song");
    audio.play().catch(()=>{});

    fireworks();

    setTimeout(()=>{
        show("final");
        typeText();
    },3000);
}

/* FIREWORKS */
function fireworks(){
    let inter=setInterval(()=>{
        let x=Math.random()*window.innerWidth;
        let y=Math.random()*window.innerHeight;

        for(let i=0;i<30;i++){
            let f=document.createElement("div");
            f.className="fire";
            f.style.background=`hsl(${Math.random()*360},100%,60%)`;
            f.style.left=x+"px";
            f.style.top=y+"px";
            f.style.setProperty("--x",(Math.random()*200-100)+"px");
            f.style.setProperty("--y",(Math.random()*200-100)+"px");

            document.body.appendChild(f);
            setTimeout(()=>f.remove(),1000);
        }
    },200);

    setTimeout(()=>clearInterval(inter),5000);
}

/* TYPING */
function typeText(){
let msg=`From the moment you came into my life ${currentName},

Everything started feeling more beautiful 💖.

Your smile, your presence, your little talks —
everything means so much to me.

Happy Birthday 🎂✨`;

    let el=document.getElementById("typing");
    el.textContent="";
    let i=0;

    function t(){
        if(i<msg.length){
            el.textContent+=msg[i++];
            setTimeout(t,20);
        }
    }
    t();
}

/* SHARE LINK */
function generateLink(){
    let name=document.getElementById("name").value;
    let age=document.getElementById("age").value;

    if(!name || !age){
        alert("Fill details first!");
        return;
    }

    let url = `${window.location.origin}${window.location.pathname}?name=${encodeURIComponent(name)}&age=${age}`;

    document.getElementById("linkBox").innerHTML =
    `<a href="${url}" target="_blank">${url}</a>`;
}

/* AUTO LOAD FROM LINK */
window.onload=function(){
    let params=new URLSearchParams(window.location.search);

    let name=params.get("name");
    let age=params.get("age");

    if(name && age){
        document.getElementById("name").value=name;
        document.getElementById("age").value=age;

        start();
    }
};

</script>

</body>
</html>
